services:
  - type: web
    name: everify-api
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server-pg.js"
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: everify-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: everify-db
    engine: postgresql
    plan: free
    version: "15"
    initialDbName: everify
