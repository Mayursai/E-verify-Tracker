services:
  - type: web
    name: everify-api
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set this in the Render dashboard to your Supabase "Session pooler"
      # connection string (Supabase dashboard -> Connect -> Session pooler).
      # Do NOT use the direct db.<ref>.supabase.co host - it is IPv6-only
      # and unreachable from Render's free tier.
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
