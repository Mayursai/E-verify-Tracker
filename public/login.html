<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - E-Verify Tracker</title>
<script>
  (function () {
    let t = null;
    try { t = localStorage.getItem('theme'); } catch (e) {}
    if (t !== 'dark' && t !== 'light') {
      t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.dataset.theme = t;
  })();
</script>
<link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <button class="theme-toggle" type="button">🌙</button>
    <h1>E-Verify Tracker</h1>
    <p class="auth-subtitle">Sign in to manage e-verify requests</p>

    <div id="alert" class="alert" style="display:none;"></div>

    <form id="login-form">
      <div class="form-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-block" id="login-btn">Sign In</button>
    </form>

    <div class="demo-credentials">
      <div><strong>Employee:</strong> emp1 / password123</div>
      <div><strong>Employer:</strong> employer1 / password123</div>
      <div><strong>HR:</strong> hr1 / password123</div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    const alertBox = document.getElementById('alert');
    const form = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');

    (async () => {
      try {
        const data = await apiFetch('/auth/me');
        window.location.href = DASHBOARD_BY_ROLE[data.user.role] || '/login.html';
      } catch (err) {
        // not logged in, stay on page
      }
    })();

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearAlert(alertBox);
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
        });
        window.location.href = DASHBOARD_BY_ROLE[data.user.role] || '/login.html';
      } catch (err) {
        showAlert(alertBox, err.message || 'Invalid username or password');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
